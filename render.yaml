# PetfoodTN — Blueprint Render (stack complet, monorepo production)
# Dashboard : New → Blueprint → GhassenEl/frontend-petfood → render.yaml → Apply

databases:
  - name: petfoodtn-db
    plan: free
    databaseName: petfood
    user: petfood

services:
  # ── API Express (dossier backend du monorepo) ──
  - type: web
    name: petfoodtn-api
    runtime: node
    plan: free
    rootDir: backend
    branch: mini-projects
    buildCommand: sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma && npm ci && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5002
      - key: DEMO_MODE
        value: 'false'
      - key: ALLOW_DEMO_LOGIN
        value: 'false'
      - key: RUN_SEED
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: petfoodtn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://petfoodtn-web.onrender.com,https://ghassenel.github.io
      - key: FRONTEND_URL
        value: https://petfoodtn-web.onrender.com
      - key: FASTAPI_URL
        value: https://petfoodtn-ml.onrender.com
      - key: STRIPE_MOCK
        value: '1'
      - key: MCP_ENABLE
        value: 'false'

  # ── ML FastAPI ──
  - type: web
    name: petfoodtn-ml
    runtime: python
    plan: free
    rootDir: fastapi_service
    branch: mini-projects
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: '3.12.8'
      - key: TZ
        value: Africa/Tunis

  # ── Frontend React (static Vite) ──
  - type: web
    name: petfoodtn-web
    runtime: static
    plan: free
    branch: mini-projects
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: VITE_API_BASE
        value: https://petfoodtn-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://petfoodtn-api.onrender.com
      - key: VITE_STRICT_LIVE
        value: 'true'
      - key: VITE_APP_RELEASE
        value: petfoodtn@render
