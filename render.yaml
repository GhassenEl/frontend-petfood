# PetfoodTN — Blueprint Render (stack complet depuis frontend-petfood)
# Déploie : PostgreSQL + API (GHCR) + ML (GHCR) + frontend static
#
# Prérequis : images GHCR publiques (workflow Publish Docker Images)
#   ghcr.io/ghassenel/petfoodtn-backend:latest
#   ghcr.io/ghassenel/petfoodtn-ml:latest
#
# Dashboard : New → Blueprint → GhassenEl/frontend-petfood

databases:
  - name: petfoodtn-db
    plan: free
    databaseName: petfood
    user: petfood

services:
  # ── API Express (image GHCR — pas besoin du repo backend sur Render) ──
  - type: web
    name: petfoodtn-api
    runtime: image
    plan: free
    image:
      url: ghcr.io/ghassenel/petfoodtn-backend:latest
      # Packages GHCR prives : decommenter apres creation credential "petfoodtn-ghcr"
      # creds:
      #   fromRegistryCreds:
      #     name: petfoodtn-ghcr
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5002
      - key: DEMO_MODE
        value: 'true'
      - key: RUN_SEED
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: petfoodtn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://petfoodtn-web.onrender.com,https://ghassenel.github.io
      - key: FASTAPI_URL
        value: https://petfoodtn-ml.onrender.com
      - key: STRIPE_MOCK
        value: '1'
      - key: MCP_ENABLE
        value: 'false'

  # ── ML FastAPI (image GHCR) ──
  - type: web
    name: petfoodtn-ml
    runtime: image
    plan: free
    image:
      url: ghcr.io/ghassenel/petfoodtn-ml:latest
      # creds:
      #   fromRegistryCreds:
      #     name: petfoodtn-ghcr
    healthCheckPath: /health
    envVars:
      - key: TZ
        value: Africa/Tunis

  # ── Frontend React (static Vite) ──
  - type: web
    name: petfoodtn-web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: VITE_API_BASE
        value: https://petfoodtn-api.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://petfoodtn-api.onrender.com
      - key: VITE_APP_RELEASE
        value: petfoodtn@render
