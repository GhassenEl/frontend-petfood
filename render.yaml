# PetfoodTN — Blueprint Render (repo frontend-petfood)
# https://render.com/docs/blueprint-spec
#
# ⚠️ Le backend est dans un repo séparé : GhassenEl/backend-petfood
#    → voir docs/render-backend.yaml à copier dans ce second repo.
#
# Déploiement :
#   1. Dashboard Render → New → Blueprint → connecter ce repo
#   2. Créer le service API depuis backend-petfood (manuel ou son render.yaml)
#   3. Renseigner VITE_API_BASE et CORS_ORIGINS (voir docs/RENDER-SETUP.md)

databases:
  - name: petfoodtn-db
    plan: free
    databaseName: petfood
    user: petfood

services:
  # ── Frontend React (site statique Vite) ──
  - type: web
    name: petfoodtn-web
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: '20'
      # À définir après création du backend Render :
      # https://petfoodtn-api.onrender.com/api
      - key: VITE_API_BASE
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: VITE_SENTRY_DSN
        sync: false
      - key: VITE_APP_RELEASE
        value: petfoodtn@render

  # ── Service ML FastAPI ──
  - type: web
    name: petfoodtn-ml
    runtime: docker
    plan: free
    rootDir: fastapi_service
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: TZ
        value: Africa/Tunis
