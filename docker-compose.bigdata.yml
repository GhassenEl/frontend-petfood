# Big Data — Kafka (ingestion temps réel PetfoodTN)
# Usage : docker compose -f docker-compose.yml -f docker-compose.bigdata.yml up -d
# Topics : petfood.orders | petfood.iot.telemetry | petfood.esp32cam.metadata | petfood.client.behavior

services:
  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: petfood-zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: 'yes'
    volumes:
      - zookeeper_data:/bitnami/zookeeper

  kafka:
    image: bitnami/kafka:3.7
    container_name: petfood-kafka
    restart: unless-stopped
    ports:
      - '${KAFKA_PORT:-9092}:9092'
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      ALLOW_PLAINTEXT_LISTENER: 'yes'
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'true'
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1']
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # Stockage objet compatible S3 — images ESP32-CAM (complément HDFS Hadoop en prod)
  minio:
    image: minio/minio:latest
    container_name: petfood-minio-cam
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9002}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-petfoodtn}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-petfoodtn-secret}
    volumes:
      - minio_cam_data:/data

volumes:
  zookeeper_data:
  kafka_data:
  minio_cam_data:
