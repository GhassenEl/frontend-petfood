# n8n — orchestration workflows PetfoodTN (rappels IoT, NLP, commandes)
# Usage : npm run n8n:up  puis  http://localhost:5678  (admin / changeme)
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: petfood-n8n
    restart: unless-stopped
    ports:
      - '${N8N_PORT:-5678}:5678'
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-Africa/Tunis}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:5678/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  n8n_data:
