<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetfoodTN — Vidéo démo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 960px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.75rem;
      font-weight: 800;
    }
    p {
      margin: 0 0 20px;
      opacity: 0.9;
      line-height: 1.5;
    }
    video {
      width: 100%;
      border-radius: 16px;
      background: #000;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .links {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    a {
      color: #bfdbfe;
      font-weight: 600;
      text-decoration: none;
    }

    </p>
    <video controls playsinline preload="metadata">
