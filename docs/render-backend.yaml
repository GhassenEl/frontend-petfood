# PetfoodTN — Blueprint Render pour le repo backend-petfood
# Copier ce fichier vers : https://github.com/GhassenEl/backend-petfood/render.yaml
#
# Puis : Render Dashboard → New → Blueprint → repo backend-petfood
# Lier la base petfoodtn-db créée par le blueprint frontend (Internal Database URL).

databases:
  - name: petfoodtn-db
    plan: free
    databaseName: petfood
    user: petfood

services:
  - type: web
    name: petfoodtn-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5002
      - key: DEMO_MODE
        value: 'true'
      - key: RUN_SEED
        value: 'true'
      - key: DATABASE_URL
        fromDatabase:
          name: petfoodtn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FASTAPI_URL
        sync: false
      - key: STRIPE_MOCK
        value: '1'
      - key: MCP_ENABLE
        value: 'false'
