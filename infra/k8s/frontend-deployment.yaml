apiVersion: apps/v1
kind: Deployment
metadata:
  name: petfood-frontend
  namespace: petfoodtn
  labels:
    app: petfood-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petfood-frontend
  template:
    metadata:
      labels:
        app: petfood-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ghassenel/petfoodtn-frontend:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: petfood-frontend
  namespace: petfoodtn
spec:
  selector:
    app: petfood-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
