name: Provision Dashboards

on:
  push:
    branches: [main]
    paths:
      - 'infra/monitoring/grafana/**'
      - 'scripts/devops/provision-dashboards.mjs'
      - '.github/workflows/provision-dashboards.yml'
  pull_request:
    paths:
      - 'infra/monitoring/grafana/**'
      - 'scripts/devops/provision-dashboards.mjs'
  workflow_dispatch:
  workflow_run:
    workflows: [Deploy VPS]
    types: [completed]
    branches: [main]

jobs:
  validate:
    name: Valider dashboards JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validation Grafana JSON
        run: node scripts/devops/provision-dashboards.mjs --validate

  provision:
    name: Provision Grafana (API)
    runs-on: ubuntu-latest
    needs: [validate]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip if Grafana secrets missing
        id: check
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          if [ -z "$GRAFANA_URL" ] || [ -z "$GRAFANA_ADMIN_PASSWORD" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Secrets GRAFANA_* absents — provisioning fichier Docker uniquement."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push dashboards vers Grafana
        if: steps.check.outputs.skip != 'true'
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: node scripts/devops/provision-dashboards.mjs --provision
