name: Sauvegarde nocturne

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup-vps:
    name: Backup PostgreSQL + médias + ML
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - id: vps
        name: Vérifier secrets VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "::notice::VPS_HOST absent — sauvegarde ignorée"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sauvegarde sur VPS
        if: steps.vps.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH || '/opt/petfoodtn' }}"
            bash "${DEPLOY_PATH}/scripts/devops/backup-nightly.sh"

      - name: Alerte échec
        if: failure() && steps.vps.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Échec sauvegarde nocturne PetfoodTN',
              labels: ['incident', 'devops', 'backup'],
              body: `Run ${context.runId} — vérifier \`scripts/devops/backup-nightly.sh\` sur le VPS.`,
            });
