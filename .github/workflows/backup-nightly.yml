name: Sauvegarde nocturne

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup-vps:
    name: Backup PostgreSQL + médias + ML
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ secrets.VPS_HOST != '' }}

    steps:
      - name: Sauvegarde sur VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH || '/opt/petfoodtn' }}"
            bash "${DEPLOY_PATH}/scripts/devops/backup-nightly.sh"

      - name: Alerte échec
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Échec sauvegarde nocturne PetfoodTN',
              labels: ['incident', 'devops', 'backup'],
              body: `Run ${context.runId} — vérifier \`scripts/devops/backup-nightly.sh\` sur le VPS.`,
            });
