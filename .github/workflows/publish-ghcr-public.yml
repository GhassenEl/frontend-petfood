name: Publish GHCR packages (public)

on:
  workflow_run:
    workflows: [Publish Docker Images]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  public-packages:
    name: Rendre les images GHCR publiques
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const names = ['petfoodtn-backend', 'petfoodtn-ml', 'petfoodtn-frontend'];
            for (const package_name of names) {
              try {
                await github.rest.packages.setPackageVisibilityForAuthenticatedUser({
                  package_type: 'container',
                  package_name,
                  visibility: 'public',
                });
                core.info(`✅ ${package_name} — public`);
              } catch (err) {
                core.warning(`⚠️ ${package_name} — ${err.message}`);
              }
            }

      - name: Vérifier pull anonyme backend
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://ghcr.io/v2/ghassenel/petfoodtn-backend/manifests/latest" || echo "000")
          echo "GHCR backend manifest: HTTP ${code}"
          if [ "$code" = "401" ]; then
            echo "::notice::Images GHCR privées — Render utilise désormais les builds Git (render.yaml). GHCR optionnel."
          fi
