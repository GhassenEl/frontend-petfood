name: Publish GHCR packages (public)

on:
  workflow_run:
    workflows: [Publish Docker Images]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  packages: write

jobs:
  public-packages:
    name: Rendre les images GHCR publiques
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Set packages public
        env:
          PACKAGES: petfoodtn-backend petfoodtn-ml petfoodtn-frontend
        run: |
          for pkg in $PACKAGES; do
            code=$(curl -sS -o /tmp/out.json -w "%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${pkg}/visibility" \
              -d '{"visibility":"public"}')
            if [ "$code" = "204" ] || [ "$code" = "200" ]; then
              echo "✅ ${pkg} — public"
            else
              echo "⚠️ ${pkg} — HTTP ${code}"
              cat /tmp/out.json || true
            fi
          done

      - name: Vérifier pull anonyme backend
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://ghcr.io/v2/ghassenel/petfoodtn-backend/manifests/latest" || echo "000")
          echo "GHCR backend manifest: HTTP ${code}"
          if [ "$code" = "401" ]; then
            echo "::warning::Images encore privées — rendez-les publics manuellement sur GitHub Packages"
          fi
