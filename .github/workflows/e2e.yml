name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Checkout backend repo
        uses: ./.github/actions/checkout-backend

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Prepare database
        working-directory: backend
        run: npx prisma generate && npx prisma db push && npm run seed
        env:
          DATABASE_URL: file:./dev.db

      - name: Start backend
        working-directory: backend
        run: npm start &
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: ci-test-secret
          DEMO_MODE: 'true'
          PORT: 5002

      - name: Start frontend (Vite dev + proxy API)
        env:
          PORT: 3001
          VITE_API_PROXY_TARGET: http://127.0.0.1:5002
        run: npx vite --host --port 3001 &

      - name: Wait for servers
        run: node scripts/wait-for-servers.js

      - name: API tests (wallet / vaccins)
        working-directory: backend
        run: node scripts/test-wallet-api.js

      - name: Playwright E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3001
          CI: true

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
