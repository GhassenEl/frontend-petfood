name: Deployment Readiness

on:
  workflow_call:
  workflow_dispatch:

jobs:
  readiness:
    name: Vérifier préparation déploiement
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build production frontend
        run: npm ci && npm run build
        env:
          VITE_API_BASE: /api
          VITE_SOCKET_URL: ''

      - name: Valider Terraform AWS
        run: |
          test -f infra/terraform/aws/main.tf
          test -f infra/terraform/aws/ecs.tf
          grep -q 'aws_ecs_cluster' infra/terraform/aws/ecs.tf
          grep -q 'aws_db_instance' infra/terraform/aws/rds.tf
          echo "infra/terraform/aws OK"

      - name: Valider platform-pipeline
        run: |
          test -f .github/workflows/platform-pipeline.yml
          grep -q 'publish-ecr.yml' .github/workflows/platform-pipeline.yml
          grep -q 'deploy-aws.yml' .github/workflows/platform-pipeline.yml
          echo "platform-pipeline.yml OK"

      - name: Sonder URL production (AWS / ALB)
        id: probe
        env:
          APP_URL: ${{ vars.UPTIME_FRONTEND_URL }}
        run: |
          probe() {
            local key="$1" url="$2"
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 25 "$url" 2>/dev/null || echo "000")
            echo "${key}=${code}" >> "$GITHUB_OUTPUT"
          }
          if [ -n "$APP_URL" ]; then
            probe web "$APP_URL"
            probe api "${APP_URL}/health"
            probe nginx "${APP_URL}/nginx-health"
          else
            echo "web=skip" >> "$GITHUB_OUTPUT"
            echo "api=skip" >> "$GITHUB_OUTPUT"
            echo "nginx=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Résumé
        run: |
          {
            echo "### Readiness — PetfoodTN (AWS)"
            echo ""
            echo "| Check | Statut |"
            echo "|-------|--------|"
            echo "| Build Vite prod | ✅ |"
            echo "| Terraform AWS | ✅ |"
            echo "| Platform pipeline | ✅ |"
            echo "| Frontend ALB | ${{ steps.probe.outputs.web || 'non configuré' }} |"
            echo "| API /health | ${{ steps.probe.outputs.api || 'non configuré' }} |"
            echo ""
            if [ "${{ steps.probe.outputs.web }}" = "skip" ]; then
              echo "➡️ Configurez \`UPTIME_FRONTEND_URL\` après \`terraform apply\`"
              echo ""
              echo "Guide : \`docs/AWS-SETUP.md\` · Pipeline : \`docs/DEVOPS-PIPELINE.md\`"
            elif [ "${{ steps.probe.outputs.web }}" = "200" ]; then
              echo "✅ Application en ligne sur AWS"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
