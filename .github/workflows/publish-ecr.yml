name: Publish ECR Images

on:
  workflow_call:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-3' }}

jobs:
  publish:
    name: Build & push ECR
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR prefix
        id: prefix
        run: |
          PREFIX="${{ vars.AWS_ECR_PREFIX || 'petfoodtn-production' }}"
          echo "prefix=${PREFIX}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - name: Checkout backend repo
        uses: ./.github/actions/checkout-backend

      - name: Patch backend CI
        uses: ./.github/actions/patch-backend-ci

      - uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=latest" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ steps.prefix.outputs.prefix }}-frontend:${{ steps.tag.outputs.value }}
            ${{ steps.ecr.outputs.registry }}/${{ steps.prefix.outputs.prefix }}-frontend:latest
          build-args: |
            VITE_API_BASE=/api
            VITE_SOCKET_URL=
            VITE_STRICT_LIVE=true
            VITE_ML_API_BASE=/fastapi
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_APP_RELEASE=petfoodtn@aws

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ steps.prefix.outputs.prefix }}-backend:${{ steps.tag.outputs.value }}
            ${{ steps.ecr.outputs.registry }}/${{ steps.prefix.outputs.prefix }}-backend:latest

      - name: Build & push ML
        uses: docker/build-push-action@v6
        with:
          context: ./fastapi_service
          file: ./fastapi_service/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ steps.prefix.outputs.prefix }}-ml:${{ steps.tag.outputs.value }}
            ${{ steps.ecr.outputs.registry }}/${{ steps.prefix.outputs.prefix }}-ml:latest

      - name: Summary
        run: |
          echo "### Images publiées sur ECR" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.ecr.outputs.registry }}/${{ steps.prefix.outputs.prefix }}-frontend:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.ecr.outputs.registry }}/${{ steps.prefix.outputs.prefix }}-backend:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.ecr.outputs.registry }}/${{ steps.prefix.outputs.prefix }}-ml:${{ steps.tag.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
