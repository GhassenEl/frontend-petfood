<!DOCTYPE html>
<html lang="fr" class="notranslate" translate="no">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PetfoodTN Mobile">
  <meta name="google" content="notranslate">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="petfoodtn_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>petfoodtn_mobile</title>
  <link rel="manifest" href="manifest.json">
  <style>
    .goog-te-banner-frame,
    .goog-te-balloon-frame,
    .goog-te-menu-frame,
    .goog-te-spinner-pos,
    #goog-gt-tt,
    #google_translate_element,
    .skiptranslate,
    iframe.goog-te-banner-frame,
    .VIpgJd-ZVi9od-ORHb-OEVmcd,
    body > .skiptranslate {
      display: none !important;
      visibility: hidden !important;
      height: 0 !important;
    }
    body { top: 0 !important; }
  </style>
</head>
<body class="notranslate" translate="no">
  <style>
    #petfoodtn-boot {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: linear-gradient(180deg, #ecfdf5 0%, #ffffff 55%);
      color: #1e3a5f;
      z-index: 9999;
    }
    #petfoodtn-boot .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #d1fae5;
      border-top-color: #059669;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <div id="petfoodtn-boot">
    <div class="spinner"></div>
    <strong>PetfoodTN</strong>
    <p style="margin:8px 0 0;font-size:14px;color:#64748b">Chargement de l'application…</p>
  </div>
  <script>
    // Purge l'ancien Service Worker (évite de resservir l'icône N&B flottante en cache)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        });
      }
    }
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('petfoodtn-boot');
      if (el) el.remove();
    });
  </script>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}
    _flutter.loader.load({
      serviceWorkerSettings: null
    });
  </script>
</body>
</html>
